front:
  text: 玉籙生神資度開收儀率四
  hash: sha256:400a3600b283c0e18a6cbfaa1089ebe1c24250b95e0a72afcec5d9e2be63d382
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0200_HFL_000-001a, image: hfl/0269/0269-004.png}
body:
  text: 早朝侍經白文伏以玄元始氣治三寶而結龍章道德貞宗映九天而成鳯篆洞真洞玄洞神之妙義太玄太平太清之靈書總之于萬八千篇祕之于三十六部或鍊金而為字或揉玉以成文玄之又玄寂而又寂所謂八公皓首當時未判玄黃九老白眉厥後初分天地無窮無極乍沈乍浮能方能圎或隱或顯虛寂非有恍忽若無以致天寶誦之以開天地之光靈寶誦之以度九幽長夜之魂神寶誦之以制靈太乙誦之以結形九天誦之以生神鬼神聞之以升遷凡夫聞之以長存幽魂聞之以聞度枯灰聞之以發煙嬰孩聞之以能言死骸聞之以還人至於三寶神奧萬品玄根祕玉笈而不傳齎金寶而方受讃揚難盡功德無邊以今欽奉綸音崇修玉籙大齊升薦某靈進登清靜重念法界孤幽苦魂等衆不能尊其氣貴其形愛其神保其命自取死壞離其本真一逝洞羣魔遊魄不顧返採集飛空景舊爽多不存罔明生化之方竟墜沈淪之趣今者嚴陳法㑹肅啓仙科寶香芬馥於九天慧炬照臨於十地以兹勝善用悼魂靈伏望金闕覃恩玉清惠命鍊魂少隂之府還神流大之庭仰憑九過之經徑陟三天之境法衆運誠志心皈命三皈依宿命贊侍經開經白文經翻一過聲洞徹於九天命度三途魂不拘於十地以今陛壇第一過轉詠九天生神玉章回向鬱單無量天帝祈恩升薦某靈進登仙境下及法界孤幽等衆當願悟從前幻妄之軀一真明了解宿世縈纏之業萬罪蕩除長夜開清神魂受鍊不入風雷獄免飛戈飄戟之憂再生胞命元證鍊氣成仙之果了無罣礙自在逍遙稽首虛皇修行經法敷座贊靜念如法寂寂至無宗至世世為仙家師題經衆諷經畢解座吟侍經回向仰惟三境高尊九天上聖俯回慈造同賜證盟臣等諷誦寶章巳周一過仰憑經法升薦某靈進登清靜下及法界孤幽超離沈冥上登道境普及一切均沾善利稽首皈依旋行讃詠步虛旋行上香師白文宣疏或符白將宣關焚化侍經宣開第二過經一唱萬真和先伸諷詠之誠二誦天地通再舉讃揚之典以今升壇第二過轉詠九天生神玉章回向上上禪善無量壽天帝祈恩升薦某靈進登仙境下及法界孤幽等衆當願聞經悟道拔罪解冤東宮頒救苦之恩北府注上生之字不入銅柱獄免手抱以足登再生胎命元俾神完而氣聚超升道境託化人天稽首虛皇修行經法敷座贊請轉法輪師題經衆諷經畢解座吟侍經回向仰惟三境髙尊九天上聖俯回慈造同賜證盟臣等諷誦寶章巳周二過仰憑經法升薦某靈進登仙境下及法界孤幽出離沈冥超沖道境普及一切均霑勝利法衆如儀旋行讃詠步虛旋行上香師白文宣疏或符白將宣關焚化侍經宣開第三過經寶範宣揚今巳周於三過神魂受度即拔出於九幽以今升壇第三過轉詠九天生神玉章回向梵監須延天帝祈恩升薦某靈進登仙境下及法界孤幽當願欲海澄波愛河息浪纍世修為之罪自此消除多生故誤之愆從兹解釋不入火翳獄變熱惱而為清涼再生魂命元得逍遙而無拘滯混合空洞氣歡樂太上前稽首虛皇修行經法敷座贊請轉法輪師題經衆諷經畢解座吟侍經回向仰惟三境高尊九天上聖俯回慈造同賜證盟臣等諷誦寶章巳周三過仰憑經法升薦某靈進登仙境下及法界孤幽出離幽冥遷升道境普及一切均沾勝利法衆如儀旋行讃詠步虛旋行上香師白文宣疏或符白將宣關焚化三聞經復爐下壇謝師念善午朝三皈依宿命贊侍經開第四過經自然九章天真隱韻誦之四過魄尸開闢以今升壇第四過轉詠九天生神玉章回向寂然兜術天帝祈恩升薦某靈進登仙境下及法界孤幽等衆當願罪愆雪釋業障氷消了悟死生之因頓覺虛無之化不入屠割獄免肢體零落之憂再生魄命無遂蓬島逍遙之樂往生神仙界控翮王母家稽首虛皇修行經法敷座贊靜念如法寂寂至無宗至世世為仙家請轉法輪師題經衆諷經畢解座吟侍經回向仰惟三境高尊九天上聖俯回慈造同賜證盟臣等諷誦寶章巳周四過用憑經法升薦某靈進登清靜下及法界孤幽超離沈冥上登道境普及一切均沾勝利法衆虔誠旋行讃詠步虛旋行上香師白文宣疏或符白將宣關焚化侍經開第五過經靈音宣演巳周五轉之功亡者受持悉赦多生之罪以今升壇第五過轉詠九天生神玉章回向波羅尼蜜不驕樂天帝祈恩升薦某靈進登仙境下及法界孤幽等衆當願悟從前之虛幻乘今日之艮因善念頓生惡根俱滅不入金剛地獄無拘囚繫閉之憂再生臟腑命元證水火返還之妙錬胎返本得道成真稽首虛皇修行經法敷座贊請轉法輪師題經衆諷經畢解座吟侍經回向仰惟三境髙尊九天上聖俯回慈造同賜證盟臣等諷誦寶章巳周五過仰憑經法升薦某靈進登仙境下及法界孤幽出離沈冥遷升道境普及一切均沾勝利法衆虔誠旋行讃詠步虛旋行上香師白文宣疏或符白將宣關焚化侍經開第六過經九氣融結成九天玄奧之文六過翻宣免六道輪回之苦以今升壇第六過轉詠九天生神玉章回向洞元化應聲天帝祈恩升薦某靈進登仙境下及法界孤幽等衆當願回光返照捨妄歸真勾銷黑簿之名遊步黃華之野不入火車地獄永無裂體之憂再生靈府命元即證錬魂之果了無凝滯即遂逍遙稽首虛皇修行經法敷座贊請轉法輪師題經衆諷經畢解座吟侍經回向仰惟三境髙尊九天上聖俯回慈造同賜證盟臣等諷誦寶章巳周六過仰憑經法升薦某靈進登仙境下及法界孤幽出離沈冥遷升道境普及一切均沾勝利法衆䖍誠旋行讃詠步虛旋行上香師白文宣疏或符白將宣關焚化三聞經復爐下壇謝師念善晚朝三皈依宿命贊侍經開第七過經三洞飛玄氣結雲篆以成文七誦重關開振靈音而起死以今升壇第七過轉詠九天生神玉章回向靈化梵輔天帝祈恩升薦某靈進登仙境下及法界孤幽當願來覩陽光永辭幽暗不入溟泠獄無寒氷凍體之憂再生元府元受暘谷回春之氣一靈澄湛三界遨遊稽首虛皇修行經法敷座贊靜念如法寂寂至無宗至世世為仙家請轉法輪師題經衆諷經畢解座吟侍經回向仰惟三境高尊九天上聖俯回慈造同賜證盟臣等諷誦寶章巳周七過仰憑經法升薦某靈進登仙境下及法界孤幽出離沈冥遷升道境普及一切均沾勝利法衆虔誠旋行讃詠步虛旋行上香師白文宣疏或符白將宣關焚化侍經開第八過經八過演生神之旨幽夜光明神魂成返本之功應時解脫以今升壇第八過轉詠九天生神玉章回向髙虛清明天帝祈恩升薦某靈進登仙境下及法界孤幽等衆當願不迷本性頓悟無為斷除愛欲之根凝化真靈之氣不入鑊湯獄免爐炭之煎熬再生華府元囿隂陽之陶冶永作逍遙之侶不拘逼合之羣稽首虛皇修行經法敷座贊請轉法輪師題經衆諷經畢解座吟侍經回向仰惟三境高尊九天上聖俯回慈造同賜證盟臣等諷誦寶章巳周八過仰憑經法升薦某靈進登仙境下及法界孤幽等衆出離沈冥遷升道境普及一切均沾勝利法衆虔誠旋行讃詠步虛旋行上香師白文宣疏或符白將宣關焚化侍經開第九過經萬真朝帝所瞻三色於空玄九遍成人功度諸天之歡恱以今升壇第九過轉詠九天生神玉章回向無想無結無愛天帝祈恩升薦某靈進登仙境下及法界孤幽等衆當願乘機而悟見善則遷覩太上之慈光度苦魂於丹界不入普掠獄免金鎚亂考之刑再生神府元證玉洞凝神之妙乘兹道力徑陟仙階稽首虛皇修行經法敷座贊請轉法輪師題經衆諷經畢解座吟侍經回向仰惟三境高尊九天上聖俯回慈造同賜證盟臣等諷誦寶章巳周九過仰憑經法升薦某靈進登仙境下及孤幽等衆永離幽冥遷升道境普及一切均沾勝利法衆虔誠旋行讃詠步虛旋行上香師白文宣疏或符白將宣關焚化侍經讃經伏以天尊造大慈之化澤及羣生至真演自然之章功成九過真風沖漠梵氣彌羅出乎太空之先肇乎太乙之始無色無緒乍存乍亡普濟人天開度魂爽今時升薦某進登仙境重慮法界孤幽苦爽等衆在世之日宿昔以來未明有漏之色身每縱多端之罪業自從命謝莫測轉輪解脫無由超升未遂若非救拔難免沈淪幸太上出書以度人為神魂生根而復命適來領衆升壇轉詠自然九天生神玉章巳周九過端用升薦某靈下及孤幽等衆伏願九真慈憫九氣結凝上以際乎九天慶雲覆于九府下以觀乎九地祥光徹于九泉沈魂滯魄盡超升宿業舊冤齊解脫罪如春雪逢暖日以俱消過若晴雲得清風而盡散常清常靜無滯無凝天精流煥九宮飛生胎結解根諸塵漏盡脫身隂府穩步仙階八極宮中永作逍遙之侶九霄府內常為遊宴之房回向巳周聞經如法三聞經師收經復爐白靈朝辭壇前謝神王下壇引靈安幕謝師念玉籙生神資度開收儀
